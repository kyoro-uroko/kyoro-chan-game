<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>キョロちゃんの冒険</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; background: #9bd6f0;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none; touch-action: none; position: fixed; inset: 0;
  }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  const VERSION = 'ver 1.3';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1, u = 1, GROUND = 70;

  function resize() {
    dpr = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth; H = window.innerHeight;
    u = Math.min(Math.max(H / 700, 0.7), 1.6);
    canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    GROUND = 70 * u;
  }
  addEventListener('resize', resize);
  addEventListener('orientationchange', () => setTimeout(resize, 200));
  resize();

  // ---------- サウンド ----------
  let actx = null;
  const audio = () => {
    actx ||= new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  };
  function blip(freq, dur, type = 'sine', vol = 0.25, slide = 0) {
    const a = audio(); if (!a) return; const t = a.currentTime;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(a.destination); o.start(t); o.stop(t + dur + 0.02);
  }
  const sndFlap  = () => blip(560, 0.10, 'sine', 0.16, 160);
  const sndEat   = () => { blip(680, 0.06, 'square', 0.16); setTimeout(() => blip(1020, 0.07, 'square', 0.15), 40); };
  const sndYum   = () => { blip(880, 0.08, 'triangle', 0.18); setTimeout(() => blip(1320, 0.09, 'triangle', 0.16), 60); setTimeout(() => blip(1760, 0.1, 'triangle', 0.14), 130); };
  const sndHit   = () => { blip(200, 0.3, 'sawtooth', 0.3, -150); blip(90, 0.35, 'square', 0.2, -40); };
  const sndBuy   = () => { blip(660, 0.08, 'triangle', 0.2); setTimeout(() => blip(880, 0.08, 'triangle', 0.2), 80); setTimeout(() => blip(1320, 0.12, 'triangle', 0.18), 160); };
  const sndSecret= () => { [262,330,392,523,659,784,1046].forEach((f,i) => setTimeout(()=>blip(f,0.12,'triangle',0.18),i*60)); };
  let warnT = 0;
  const sndWarn  = () => blip(330, 0.12, 'square', 0.12, -60);
  const sndTurbo = () => { [523,659,784,1046].forEach((f,i) => setTimeout(()=>blip(f,0.12,'square',0.2),i*55)); };

  // ---------- 状態 ----------
  const READY = 0, PLAY = 1, DEAD = 2, SHOP = 3;
  let state = READY;
  let best = +(localStorage.getItem('kyoro_dist') || 0);

  // ---------- コスチュームシステム ----------
  const COSTUMES = [
    // スコア解放（ベスト距離）
    { id:'ribbon',       name:'リボン',          emoji:'🎀', type:'score',  need:1000,  slot:'head', desc:'1000m達成で解放' },
    { id:'strawhat',     name:'麦わら帽子',      emoji:'🌾', type:'score',  need:2000,  slot:'head', desc:'2000m達成で解放' },
    { id:'silkhat',      name:'シルクハット',    emoji:'🎩', type:'score',  need:3000,  slot:'head', desc:'3000m達成で解放' },
    { id:'baseballcap',  name:'野球帽',          emoji:'🧢', type:'score',  need:5000,  slot:'head', desc:'5000m達成で解放' },
    { id:'rainwing',     name:'虹色の羽',        emoji:'🌈', type:'score',  need:10000, slot:'wing', desc:'10000m達成で解放' },
    // 餌購入
    { id:'herocape',     name:'ヒーローマント',  emoji:'🦸', type:'food',   need:100,   slot:'body', desc:'餌100個で購入' },
    { id:'santahat',     name:'サンタ帽',        emoji:'🎅', type:'food',   need:300,   slot:'head', desc:'餌300個で購入' },
    { id:'blackwing',    name:'黒羽',            emoji:'🖤', type:'food',   need:600,   slot:'wing', desc:'餌600個で購入' },
    { id:'rainbowcape',  name:'虹マント',        emoji:'🌈', type:'food',   need:700,   slot:'body', desc:'餌700個で購入' },
    { id:'tenki',        name:'天敵',            emoji:'🦅', type:'food',   need:800,   slot:'skin', desc:'餌800個で購入' },
    // シークレット（累計距離）
    { id:'moonwing',     name:'月の羽',          emoji:'🌙', type:'secret', need:10000, slot:'wing', desc:'累計10000m' },
    { id:'firecape',     name:'炎マント',        emoji:'🔥', type:'secret', need:20000, slot:'body', desc:'累計20000m' },
    { id:'goldmedal',    name:'金メダル',        emoji:'🏅', type:'secret', need:30000, slot:'acc',  desc:'累計30000m' },
    { id:'lightwing',    name:'雷の羽',          emoji:'⚡', type:'secret', need:40000, slot:'wing', desc:'累計40000m' },
    { id:'diamondcrown', name:'究極の冠',        emoji:'💎', type:'secret', need:50000, slot:'head', desc:'累計50000m' },
    // シークレット（カラス衝突）
    { id:'karasu',       name:'カラス',          emoji:'🐦', type:'crow',   need:50,    slot:'skin', desc:'カラスに50回ぶつかる' },
  ];

  let totalFood  = +(localStorage.getItem('kyoro_food')       || 0);
  let totalDist  = +(localStorage.getItem('kyoro_totaldist')  || 0);
  let crowHits   = +(localStorage.getItem('kyoro_crow')       || 0);
  let ownedArr   = JSON.parse(localStorage.getItem('kyoro_owned') || '[]');
  let equip      = Object.assign({ head:null, wing:null, acc:null, body:null, skin:null },
                     JSON.parse(localStorage.getItem('kyoro_equip') || '{}'));

  function saveCS() {
    localStorage.setItem('kyoro_food',      totalFood);
    localStorage.setItem('kyoro_totaldist', totalDist);
    localStorage.setItem('kyoro_crow',      crowHits);
    localStorage.setItem('kyoro_owned',     JSON.stringify(ownedArr));
    localStorage.setItem('kyoro_equip',     JSON.stringify(equip));
  }
  function isOwned(id) { return ownedArr.includes(id); }

  function checkScoreUnlocks() {
    const got = [];
    for (const c of COSTUMES) {
      if (c.type === 'score' && best >= c.need && !isOwned(c.id)) {
        ownedArr.push(c.id); got.push(c);
      }
    }
    if (got.length) saveCS();
    return got;
  }
  function checkSecretUnlocks() {
    const got = [];
    for (const c of COSTUMES) {
      if (c.type === 'secret' && totalDist >= c.need && !isOwned(c.id)) {
        ownedArr.push(c.id); got.push(c);
      }
    }
    if (got.length) saveCS();
    return got;
  }
  function checkCrowUnlock() {
    const got = [];
    for (const c of COSTUMES) {
      if (c.type === 'crow' && crowHits >= c.need && !isOwned(c.id)) {
        ownedArr.push(c.id); got.push(c);
      }
    }
    if (got.length) saveCS();
    return got;
  }

  let shopButtons = [];
  let shopFrom    = DEAD;
  let newUnlocks  = [];
  let cheatBuffer = '';

  // ---------- ゲーム変数 ----------
  let bird, hawk, foods, obstacles, flyers, parts, lines, dist, time, spawnT, obsT, flyerT, gauge, turbo, bonus, turboT, hawkBoost, sstar, sstarT, curBiome, biomeBanner, deadTimer, shake, flash, eatPop, deathReason;
  const clouds = Array.from({ length: 5 }, () => ({ x: Math.random(), y: Math.random() * 0.45, s: 0.5 + Math.random() * 0.7, sp: 5 + Math.random() * 9 }));
  const stars  = Array.from({ length: 40 }, () => ({ x: Math.random(), y: Math.random() * 0.6, r: Math.random() * 1.6 + 0.5, tw: Math.random() * 6 }));
  const mixA = (a, b, t) => [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
  const rgb  = c => `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
  const mix  = (a, b, t) => rgb(mixA(a, b, t));
  const nightLevel = () => (1 + Math.cos((time / 60) * Math.PI * 2)) / 2;
  const duskLevel  = () => Math.max(0, 1 - Math.abs(nightLevel() - 0.5) * 2);
  const BIOME_LEN   = 5000;
  const BIOME_NAMES = ['🏙 街エリア', '🌳 森エリア', '🌊 海エリア'];
  const biome = () => Math.floor(dist / BIOME_LEN) % 3;

  const SPD_MIN      = () => W * 0.36;
  const SPD_NORM_MAX = () => W * 1.60;
  const MAX_SPEED    = () => W * 1.95;
  const HAWK_BASE    = () => W * 0.52;
  const DRAIN     = 0.08;
  const REFILL    = 0.07;
  const NICE_NEED = 7;
  const TURBO_TIME = 5;

  function birdSpeed() { return turbo ? MAX_SPEED() : SPD_MIN() + gauge * (SPD_NORM_MAX() - SPD_MIN()); }
  function hawkSpeed() { return HAWK_BASE() + time * 1.1 + dist * 0.04 + hawkBoost; }

  function reset() {
    bird = { x: W * 0.32, y: H * 0.4, vy: 0, r: 20 * u, rot: 0, flap: 0 };
    hawk = { x: 24 * u, y: H * 0.4, vx: 0, r: 46 * u, lunge: 0 };
    hawkBoost = 0;
    foods = []; obstacles = []; flyers = []; parts = []; lines = [];
    dist = 0; time = 0; spawnT = 0.5; obsT = 6; flyerT = 4; gauge = 0.27; turbo = false; bonus = 0; turboT = 0;
    sstar = null; sstarT = 14;
    curBiome = -1; biomeBanner = 0;
    gap = bird.x - hawk.x;
    deadTimer = 0; shake = 0; flash = 0; eatPop = 0; deathReason = '';
  }
  let gap = 0;

  const FOODS = ['🍎', '🌾', '🌻', '🫐', '🍒', '🍓'];
  function avoidObstacles(list) {
    for (const f of list) {
      for (const o of obstacles) {
        const m = o.w;
        if (f.x > o.x - m && f.x < o.x + o.w + m) {
          const clr = f.r + 18 * u;
          if (o.mode === 'over') f.y = Math.min(f.y, o.topY - clr);
          else f.y = Math.max(f.y, o.holeY + clr);
        }
      }
      f.y = Math.max(36 * u, Math.min(H - GROUND - 36 * u, f.y));
    }
  }
  function spawnFood() {
    const band = H - GROUND;
    const n = 3 + (Math.random() * 3 | 0);
    const amp = (30 + Math.random() * 32) * u;
    const dir = Math.random() < 0.6 ? 1 : -1;
    const margin = 55 * u;
    const baseY = margin + amp + Math.random() * Math.max(10 * u, band - 2 * margin - 2 * amp);
    const wave = { total: n, got: 0, dead: false };
    const made = [];
    for (let i = 0; i < n; i++) {
      const t = n > 1 ? i / (n - 1) : 0;
      const y = baseY + dir * Math.sin(t * Math.PI) * amp;
      const f = { x: W + 40 * u + i * 52 * u, y, emoji: FOODS[Math.random() * FOODS.length | 0], r: 24 * u, eaten: false, bob: Math.random() * 6, wave };
      foods.push(f); made.push(f);
    }
    avoidObstacles(made);
  }

  function pushOver(kind, w, topY)   { obstacles.push({ mode:'over',  kind, x: W+60*u, w: w*u, topY }); }
  function pushUnder(kind, w, holeY) { obstacles.push({ mode:'under', kind, x: W+60*u, w: w*u, holeY }); }

  function spawnObstacle() {
    const band = H - GROUND, r = Math.random();
    if (curBiome === 0) {
      if (r < 0.38)      pushOver('house',    56, band*(0.66+Math.random()*0.08));
      else if (r < 0.66) pushOver('building', 54, band*(0.50+Math.random()*0.12));
      else if (r < 0.84) pushOver('pole',     28, band*(0.52+Math.random()*0.06));
      else               pushUnder('sign',    56, band*(0.30+Math.random()*0.18));
    } else if (curBiome === 1) {
      if (r < 0.5) pushOver('tree',     50, band*(0.60+Math.random()*0.16));
      else         pushUnder('hangtree',50, band*(0.28+Math.random()*0.22));
    } else {
      if (r < 0.5)      pushOver('buoy',  36, band*(0.74+Math.random()*0.05));
      else if (r < 0.8) pushOver('rock',  50, band*(0.72+Math.random()*0.06));
      else              pushUnder('cloud',60, band*(0.30+Math.random()*0.16));
    }
    avoidObstacles(foods);
  }

  function spawnFlyer() {
    const band = H - GROUND;
    if (Math.random() < 0.62) {
      const highY = 30*u + Math.random()*band*0.40;
      flyers.push({ kind:'crow', x:W+70*u, y0:highY, y:highY, r:22*u, extra:W*0.05, amp:(20+Math.random()*30)*u, ph:Math.random()*6 });
    } else if (curBiome === 0) {
      flyers.push({ kind:'car',  x:W+80*u, y:H-GROUND-16*u, r:24*u, extra:W*0.10, ph:0 });
    } else if (curBiome === 2) {
      flyers.push({ kind:'boat', x:W+90*u, y:H-GROUND-18*u, r:28*u, extra:W*0.08, ph:0 });
    } else {
      const highY = 30*u + Math.random()*band*0.40;
      flyers.push({ kind:'crow', x:W+70*u, y0:highY, y:highY, r:22*u, extra:W*0.05, amp:(20+Math.random()*30)*u, ph:Math.random()*6 });
    }
  }

  function burst(x, y, color, n, spd = 200) {
    for (let i = 0; i < n; i++) {
      const a = Math.random()*Math.PI*2, s = (50+Math.random()*spd)*u;
      parts.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, r:(2+Math.random()*4)*u, color });
    }
  }
  function popText(x, y, str, color) { parts.push({ txt:str, x, y, vy:-60*u, life:1, color }); }

  function flap() {
    if (state === READY) { state = PLAY; bird.vy = -460*u; sndFlap(); }
    else if (state === PLAY) { bird.vy = -460*u; bird.flap=1; sndFlap(); burst(bird.x-8*u,bird.y+8*u,'rgba(255,255,255,0.8)',3); }
    else if (state === DEAD && deadTimer > 0.7) { reset(); state = READY; }
  }

  // ---------- イベント ----------
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault(); audio();
    const px = e.clientX, py = e.clientY;
    if (state === SHOP) { handleShopClick(px, py); return; }
    if (state === DEAD && deadTimer > 0.7) {
      for (const btn of shopButtons) {
        if (btn.isShopBtn && px>=btn.x && px<=btn.x+btn.w && py>=btn.y && py<=btn.y+btn.h) {
          shopFrom=DEAD; state=SHOP; return;
        }
      }
    }
    if (state === READY) {
      for (const btn of shopButtons) {
        if (btn.isShopBtn && px>=btn.x && px<=btn.x+btn.w && py>=btn.y && py<=btn.y+btn.h) {
          shopFrom=READY; state=SHOP; return;
        }
      }
    }
    flap();
  }, { passive: false });
  canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

  addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); audio(); flap(); }
  });
  addEventListener('keydown', e => {
    if (e.code === 'KeyT' && state === PLAY && !turbo) {
      audio(); bonus=0; turbo=true; turboT=TURBO_TIME; sndTurbo(); flash=0.6; shake=12*u;
      popText(bird.x, bird.y-38*u, 'TURBO!', '#ff8a3d');
    }
    // チートコード: ショップ中に「12345」で全解放
    if (state === SHOP) {
      if (/^[1-5]$/.test(e.key)) {
        cheatBuffer += e.key;
        if (cheatBuffer.length > 5) cheatBuffer = cheatBuffer.slice(-5);
        if (cheatBuffer === '12345') {
          for (const c of COSTUMES) { if (!isOwned(c.id)) ownedArr.push(c.id); }
          saveCS(); sndSecret(); cheatBuffer = '';
        }
      } else { cheatBuffer = ''; }
    } else { cheatBuffer = ''; }
  });

  reset();

  // ---------- ショップ ----------
  function handleShopClick(px, py) {
    for (const btn of shopButtons) {
      if (px<btn.x || px>btn.x+btn.w || py<btn.y || py>btn.y+btn.h) continue;
      if (btn.isBack) { state=shopFrom; shopButtons=[]; return; }
      if (btn.costume) {
        const c = btn.costume;
        if (!isOwned(c.id)) {
          if (c.type === 'food' && totalFood >= c.need) {
            totalFood -= c.need; ownedArr.push(c.id); equip[c.slot]=c.id; saveCS(); sndBuy();
          }
        } else {
          equip[c.slot] = (equip[c.slot]===c.id) ? null : c.id; saveCS(); sndEat();
        }
      }
      return;
    }
  }

  function renderShop() {
    shopButtons = [];
    ctx.fillStyle='rgba(14,22,40,0.97)'; ctx.fillRect(0,0,W,H);

    const hy = H * 0.07;
    text('🛍 ショップ', W/2, hy, 24*u, '#fff');
    text(`🍎 持っている餌: ${totalFood} 個`, W/2, hy+30*u, 14*u, '#ffe27a');

    const scoreCostumes  = COSTUMES.filter(c => c.type==='score');
    const foodCostumes   = COSTUMES.filter(c => c.type==='food');
    const secretCostumes = COSTUMES.filter(c => c.type==='secret'||c.type==='crow');

    const padX  = 14*u;
    const cardW = (W - padX*3) / 2;
    const numRows = Math.ceil(scoreCostumes.length/2) + Math.ceil(foodCostumes.length/2) + Math.ceil(secretCostumes.length/2);
    const secH   = 26*u;
    const backBH = 52*u;
    const topY   = hy + 46*u;
    const totalCardArea = H - topY - 3*secH - backBH - 14*u;
    const cardH  = Math.min(80*u, totalCardArea/numRows - 6*u);
    const gapH   = 6*u;

    let curY = topY;

    const drawSection = (label, costumes, isSecret) => {
      ctx.fillStyle='rgba(255,255,255,0.08)';
      roundRect(padX, curY, W-padX*2, secH, 8*u); ctx.fill();
      text(label, W/2, curY+secH/2, 12*u, 'rgba(255,255,255,0.85)');
      curY += secH + 4*u;

      costumes.forEach((c, i) => {
        const col = i % 2;
        const row = Math.floor(i / 2);
        const cx  = padX + col*(cardW+padX);
        const cy  = curY + row*(cardH+gapH);

        const owned     = isOwned(c.id);
        const equipped  = equip[c.slot]===c.id;
        const canAfford = c.type==='food' && !owned && totalFood>=c.need;
        const hidden    = isSecret && !owned;

        let bg = owned
          ? (equipped ? 'rgba(255,210,60,0.22)' : 'rgba(255,255,255,0.1)')
          : (canAfford ? 'rgba(80,200,100,0.18)' : (hidden ? 'rgba(30,20,50,0.7)' : 'rgba(60,60,90,0.5)'));
        ctx.fillStyle=bg;
        roundRect(cx,cy,cardW,cardH,10*u); ctx.fill();
        if (equipped) {
          ctx.strokeStyle='#ffd700'; ctx.lineWidth=2.5*u;
          roundRect(cx,cy,cardW,cardH,10*u); ctx.stroke();
        }
        if (canAfford) {
          ctx.strokeStyle='#5fe870'; ctx.lineWidth=1.5*u;
          roundRect(cx,cy,cardW,cardH,10*u); ctx.stroke();
        }
        if (hidden) {
          ctx.strokeStyle='rgba(180,100,255,0.3)'; ctx.lineWidth=1*u;
          roundRect(cx,cy,cardW,cardH,10*u); ctx.stroke();
        }

        const emSize = cardH*0.42;
        ctx.globalAlpha = owned ? 1 : 0.35;
        ctx.font = emSize+'px serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(hidden ? '🔒' : c.emoji, cx+cardH*0.38, cy+cardH/2);
        ctx.globalAlpha=1;

        const tx  = cx+cardH*0.72;
        const tw  = cardW-cardH*0.72-6*u;
        const tcx = tx+tw/2;

        if (hidden) {
          text('？ ？ ？', tcx, cy+cardH*0.3, 12*u, 'rgba(180,100,255,0.7)', 'center', '700');
          text('シークレット', tcx, cy+cardH*0.65, 10*u, 'rgba(150,80,220,0.8)', 'center');
        } else if (equipped) {
          text(c.name, tcx, cy+cardH*0.3, 11*u, '#fff', 'center', '700');
          text('✅ 装備中', tcx, cy+cardH*0.65, 10*u, '#ffd700', 'center', '700');
        } else if (owned) {
          text(c.name, tcx, cy+cardH*0.3, 11*u, '#fff', 'center', '700');
          text('タップで装備', tcx, cy+cardH*0.65, 10*u, '#89d9ff', 'center');
        } else if (canAfford) {
          text(c.name, tcx, cy+cardH*0.3, 11*u, '#ccc', 'center', '700');
          text('✨ 購入できる！', tcx, cy+cardH*0.58, 10*u, '#5fe870', 'center', '700');
          text(c.desc, tcx, cy+cardH*0.82, 9*u, '#aaa', 'center');
        } else {
          text(c.name, tcx, cy+cardH*0.3, 11*u, '#888', 'center', '700');
          text(c.desc, tcx, cy+cardH*0.58, 9.5*u, '#666', 'center');
          if (c.type==='food') {
            text(`あと ${c.need-totalFood} 個`, tcx, cy+cardH*0.8, 9*u, '#777', 'center');
          }
        }

        shopButtons.push({ x:cx, y:cy, w:cardW, h:cardH, costume:c });
      });

      curY += Math.ceil(costumes.length/2)*(cardH+gapH)+6*u;
    };

    drawSection('🏆 スコア解放', scoreCostumes, false);
    drawSection('🍎 餌で購入',   foodCostumes,  false);
    drawSection('🔒 シークレット', secretCostumes, true);

    // もどるボタン
    const bw=Math.min(200*u,W*0.55), bh=44*u;
    const bx=W/2-bw/2, by=H-bh-14*u;
    ctx.fillStyle='rgba(255,255,255,0.15)';
    roundRect(bx,by,bw,bh,bh/2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5*u;
    roundRect(bx,by,bw,bh,bh/2); ctx.stroke();
    text('← もどる', W/2, by+bh/2, 16*u, '#fff');
    shopButtons.push({ x:bx, y:by, w:bw, h:bh, isBack:true });
  }

  // ---------- 更新 ----------
  const GRAV = () => 1750 * u;
  function update(dt) {
    if (state === SHOP) return;
    time += dt;
    const scroll = state===PLAY ? birdSpeed() : SPD_MIN()*0.5;
    for (const c of clouds) { c.x -= (scroll*0.4)/W*dt; if(c.x<-0.15){c.x=1.1;c.y=Math.random()*0.45;} }

    if (state === READY) {
      bird.y   = H*0.4 + Math.sin(time*2.2)*12*u;
      bird.rot = Math.sin(time*2.2)*0.1;
      bird.flap= (Math.sin(time*6)+1)/2;
      hawk.y  += (bird.y-hawk.y)*Math.min(1,dt*3);
      return;
    }

    if (state === PLAY) {
      gauge = Math.max(0, gauge-DRAIN*dt);
      if (turbo) { turboT-=dt; if(turboT<=0){turbo=false;turboT=0;gauge=Math.max(gauge,0.5);} }

      const spd = birdSpeed();
      dist += spd*dt*0.05;

      const b = biome();
      if (b!==curBiome) { curBiome=b; biomeBanner=2.6; }
      if (biomeBanner>0) biomeBanner=Math.max(0,biomeBanner-dt);

      hawkBoost=Math.max(0,hawkBoost-W*0.04*dt);
      const closeRate=hawkSpeed()-spd;
      const targetVx=(hawk.x<=bird.x)?closeRate:-Math.max(W*0.30,Math.abs(closeRate));
      hawk.vx+=(targetVx-hawk.vx)*Math.min(1,dt*2.2);
      hawk.x +=hawk.vx*dt;
      hawk.x  =Math.max(-10*u,Math.min(bird.x+75*u,hawk.x));
      hawk.y +=(bird.y-hawk.y)*Math.min(1,dt*2.2);
      hawk.lunge=Math.max(0,hawk.lunge-dt*2);
      gap=bird.x-hawk.x;

      if(gap<bird.x*0.3){warnT-=dt;if(warnT<=0){sndWarn();warnT=0.5;}}
      if(!turbo&&Math.hypot(hawk.x-bird.x,hawk.y-bird.y)<bird.r+hawk.r-22*u){deathReason='hawk';die();}

      bird.vy+=GRAV()*dt; bird.y+=bird.vy*dt;
      bird.rot=Math.max(-0.5,Math.min(1.3,bird.vy/(700*u)));
      bird.flap=Math.max(0,bird.flap-dt*4);
      if(bird.y-bird.r<0){bird.y=bird.r;bird.vy=0;}
      if(bird.y+bird.r>H-GROUND){bird.y=H-GROUND-bird.r;bird.vy=0;if(!turbo){deathReason='ground';die();}}

      spawnT-=dt;
      if(spawnT<=0){spawnFood();spawnT=1.7+Math.random()*1.3;}

      for(const f of foods){
        f.x-=spd*dt;
        if(f.eaten)continue;
        if(hawk.x<=bird.x&&Math.hypot(f.x-hawk.x,f.y-hawk.y)<hawk.r+f.r){
          f.eaten=true;f.wave.dead=true;hawkBoost=Math.min(W*0.30,hawkBoost+W*0.045);hawk.lunge=0.5;burst(f.x,f.y,'#c0653a',8);
          continue;
        }
        if(Math.hypot(f.x-bird.x,f.y-bird.y)<bird.r+f.r+(turbo?14*u:0)){
          f.eaten=true;eatPop=1;
          totalFood++;
          saveCS();
          if(!turbo)gauge=Math.min(1,gauge+REFILL);
          sndEat();burst(f.x,f.y,'#ffe08a',7);
          f.wave.got++;
          if(!turbo&&!f.wave.dead&&f.wave.got>=f.wave.total){
            bonus++;
            sndYum();burst(bird.x,bird.y,'#ffd54a',14,240);popText(bird.x,bird.y-38*u,'NICE!','#ff8a3d');
            if(bonus>=NICE_NEED){bonus=0;turbo=true;turboT=TURBO_TIME;sndTurbo();flash=0.6;shake=12*u;popText(bird.x,bird.y-64*u,'TURBO!','#ff5a3c');}
          }
        }
      }
      for(const f of foods){if(f.x<-80*u&&!f.eaten)f.wave.dead=true;}
      foods=foods.filter(f=>f.x>-80*u&&!f.eaten);

      obsT-=dt;
      if(time>6&&obsT<=0){spawnObstacle();obsT=4.5+Math.random()*4;}
      for(const o of obstacles){
        o.x-=spd*dt;
        const inX=bird.x+bird.r>o.x+o.w*0.18&&bird.x-bird.r<o.x+o.w*0.82;
        let hit=false;
        if(inX){
          if(o.mode==='under')hit=bird.y-bird.r<o.holeY;
          else hit=bird.y+bird.r>o.topY+8*u;
        }
        if(hit){
          if(turbo){if(!o.smashed){o.smashed=true;burst(bird.x,bird.y,'#5fc46a',14,260);}}
          else if(!o.smashed){deathReason='crash';die();}
        }
      }
      obstacles=obstacles.filter(o=>o.x>-140*u);

      flyerT-=dt;
      if(time>5&&flyerT<=0){spawnFlyer();flyerT=3+Math.random()*3.5;}
      for(const fl of flyers){
        fl.x-=(spd+fl.extra)*dt;
        if(fl.kind==='crow'){fl.ph+=dt*4;fl.y=fl.y0+Math.sin(fl.ph)*fl.amp;}
        if(Math.hypot(fl.x-bird.x,fl.y-bird.y)<bird.r+fl.r-6*u){
          if(turbo){if(!fl.smashed){fl.smashed=true;burst(fl.x,fl.y,'#444',14,260);}}
          else if(!fl.smashed){deathReason=fl.kind;die();}
        }
      }
      flyers=flyers.filter(fl=>fl.x>-140*u);

      sstarT-=dt;
      if(!sstar&&sstarT<=0){
        const band=H-GROUND;
        sstar={x:W+30*u,y:band*(0.25+Math.random()*0.4),
          vx:-(0.28+Math.random()*0.18)*W,vy:(Math.random()<0.5?-1:1)*(0.25+Math.random()*0.2)*band,
          r:22*u,life:10,spark:0};
        sstarT=24+Math.random()*14;
      }
      if(sstar){
        sstar.life-=dt; sstar.x+=sstar.vx*dt; sstar.y+=sstar.vy*dt;
        const m=30*u,by0=30*u,by1=H-GROUND-30*u;
        if(sstar.x<m){sstar.x=m;sstar.vx=Math.abs(sstar.vx);}
        if(sstar.x>W-m){sstar.x=W-m;sstar.vx=-Math.abs(sstar.vx);}
        if(sstar.y<by0){sstar.y=by0;sstar.vy=Math.abs(sstar.vy);}
        if(sstar.y>by1){sstar.y=by1;sstar.vy=-Math.abs(sstar.vy);}
        sstar.spark-=dt;
        if(sstar.spark<=0){burst(sstar.x,sstar.y,'#fff3a0',3,120);sstar.spark=0.08;}
        if(Math.hypot(sstar.x-bird.x,sstar.y-bird.y)<bird.r+sstar.r){
          turbo=true;turboT=TURBO_TIME;bonus=0;sndTurbo();flash=0.7;shake=14*u;
          burst(sstar.x,sstar.y,'#ffe27a',24,320);popText(bird.x,bird.y-40*u,'TURBO!','#ff5a3c');
          sstar=null;
        } else if(sstar.life<=0){sstar=null;}
      }

      const fast=turbo?1:Math.max(0.05,(spd-SPD_MIN())/(SPD_NORM_MAX()-SPD_MIN()));
      if(Math.random()<fast*0.9)lines.push({x:W+10,y:Math.random()*(H-GROUND),len:(30+Math.random()*60)*u,life:1,turbo});
      for(const l of lines){l.x-=(spd*1.5)*dt;l.life-=dt*1.5;}
      lines=lines.filter(l=>l.life>0&&l.x>-100);
    }

    if(state===DEAD){
      deadTimer+=dt;
      if(deathReason!=='hawk'){bird.vy+=GRAV()*dt;bird.y+=bird.vy*dt;if(bird.y+bird.r>H-GROUND){bird.y=H-GROUND-bird.r;bird.vy=0;}}
      else{hawk.y+=(bird.y-hawk.y)*Math.min(1,dt*4);}
    }

    for(const p of parts){
      if(p.txt){p.y+=p.vy*dt;p.vy*=0.92;p.life-=dt;}
      else{p.vy+=500*u*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt*1.5;}
    }
    parts=parts.filter(p=>p.life>0);
    if(shake>0)shake=Math.max(0,shake-dt*50);
    if(flash>0)flash=Math.max(0,flash-dt*3);
    if(eatPop>0)eatPop=Math.max(0,eatPop-dt*3);
  }

  function die() {
    if(state!==PLAY)return;
    state=DEAD;deadTimer=0;shake=18*u;flash=1;hawk.lunge=1;
    sndHit();burst(bird.x,bird.y,'#6fd36f',22,300);
    const d=Math.floor(dist);
    if(d>best){best=d;localStorage.setItem('kyoro_dist',best);}
    totalDist+=d;
    if(deathReason==='crow'){crowHits++;}
    newUnlocks=[...checkScoreUnlocks(),...checkSecretUnlocks(),...checkCrowUnlock()];
    saveCS();
  }

  // ---------- 描画ヘルパー ----------
  function roundRect(x,y,w,h,r){
    ctx.beginPath();ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
  }
  function text(str,x,y,size,color,align='center',weight='bold'){
    ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline='middle';
    ctx.font=`${weight} ${size}px -apple-system,"Hiragino Sans",sans-serif`;
    ctx.fillText(str,x,y);
  }

  // ---------- キョロちゃん描画（コスチューム対応） ----------
  function drawBird(x,y,r,rot,flapAmt,isHawk){
    ctx.save();ctx.translate(x,y);ctx.rotate(rot);

    const skin = !isHawk ? equip.skin : null;
    const drawAsHawk = isHawk || skin==='tenki';
    const drawAsCrow = skin==='karasu';

    // カラススキン: 全体を黒いカラス風に上書き
    if(drawAsCrow){
      const wing=-0.3-flapAmt*1.1;
      ctx.fillStyle='#1a1a26';ctx.save();ctx.rotate(wing);ctx.beginPath();ctx.ellipse(-r*0.15,0,r*0.95,r*0.5,0,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.fillStyle='#2a2a36';ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1e1e28';ctx.beginPath();ctx.arc(r*0.25,r*0.25,r*0.6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#e0a23a';ctx.beginPath();ctx.moveTo(r*0.8,-2*u);ctx.lineTo(r*1.45,1*u);ctx.lineTo(r*0.8,7*u);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(r*0.4,-r*0.3,6*u,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#c00';ctx.beginPath();ctx.arc(r*0.5,-r*0.3,3*u,0,Math.PI*2);ctx.fill();
      ctx.restore();
      return;
    }

    // ★ マント（bodyスロット）
    if(!drawAsHawk&&equip.body){
      const bs=equip.body;
      const capeShape=()=>{ctx.beginPath();ctx.moveTo(-r*0.1,-r*0.5);ctx.lineTo(-r*1.5,-r*0.35);ctx.lineTo(-r*1.7,r*1.15);ctx.lineTo(-r*0.1,r*0.5);ctx.closePath();};
      if(bs==='herocape'){
        ctx.fillStyle='#c82020';capeShape();ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.14)';
        ctx.beginPath();ctx.moveTo(-r*0.1,-r*0.4);ctx.lineTo(-r*0.7,-r*0.22);ctx.lineTo(-r*0.8,r*0.7);ctx.lineTo(-r*0.1,r*0.4);ctx.closePath();ctx.fill();
      } else if(bs==='rainbowcape'){
        const rg=ctx.createLinearGradient(-r*1.7,-r*0.35,-r*0.1,r*0.5);
        rg.addColorStop(0,`hsl(${(time*100)%360},90%,60%)`);
        rg.addColorStop(0.5,`hsl(${(time*100+160)%360},90%,60%)`);
        rg.addColorStop(1,`hsl(${(time*100+320)%360},90%,60%)`);
        ctx.fillStyle=rg;capeShape();ctx.fill();
      } else if(bs==='firecape'){
        // 炎マント：ゆらぐ炎色グラデーション
        const fg=ctx.createLinearGradient(-r*1.7,r*1.0,-r*0.1,-r*0.5);
        fg.addColorStop(0,`hsl(${10+Math.sin(time*7)*8},100%,28%)`);
        fg.addColorStop(0.4,`hsl(${22+Math.sin(time*5)*10},100%,50%)`);
        fg.addColorStop(1,`hsl(${48+Math.sin(time*4)*12},100%,68%)`);
        ctx.fillStyle=fg;capeShape();ctx.fill();
        // 炎の先端パーティクル的なエッジ
        ctx.fillStyle=`rgba(255,180,30,${0.35+0.2*Math.sin(time*12)})`;
        ctx.beginPath();ctx.moveTo(-r*0.1,-r*0.5);ctx.lineTo(-r*1.5,-r*0.35);ctx.lineTo(-r*1.6,r*0.6);ctx.lineTo(-r*0.1,r*0.4);ctx.closePath();ctx.fill();
      }
    }

    // ★ 翼の色（wingスロット）
    let wc1=drawAsHawk?'#7a4a2a':'#3fae5a';
    let wc2=drawAsHawk?'#9a5a33':'#5ec873';
    let bodyGlow=null;
    if(!drawAsHawk){
      const ws=equip.wing;
      if(ws==='blackwing') {wc1='#1a1a28';wc2='#2a2a3a';}
      else if(ws==='rainwing')     {wc1=`hsl(${(time*180)%360},90%,55%)`;wc2=`hsl(${(time*180+120)%360},90%,65%)`;}
      else if(ws==='goldwing')     {wc1='#b8860b';wc2='#ffd700';}
      else if(ws==='moonwing')     {wc1='#8ab8d8';wc2='#c0d8f0';bodyGlow='rgba(140,200,255,0.18)';}
      else if(ws==='lightwing')    {wc1=`hsl(${48+Math.sin(time*18)*8},100%,52%)`;wc2=`hsl(${55+Math.sin(time*14)*6},100%,72%)`;}
    }
    const wing=-0.3-flapAmt*1.1;
    ctx.fillStyle=wc1;
    ctx.save();ctx.rotate(wing);ctx.beginPath();ctx.ellipse(-r*0.15,0,r*0.95,r*0.5,0,0,Math.PI*2);ctx.fill();ctx.restore();

    // 体
    ctx.fillStyle=wc2;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    if(!drawAsHawk){
      ctx.fillStyle='#cdeaa0';ctx.beginPath();ctx.arc(r*0.25,r*0.25,r*0.6,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(90,140,60,0.5)';ctx.lineWidth=1.2*u;
      for(let i=-1;i<=1;i++){ctx.beginPath();ctx.arc(r*0.25,r*0.25+i*6*u,r*0.45,0.15*Math.PI,0.85*Math.PI);ctx.stroke();}
      if(equip.wing==='blackwing'){ctx.fillStyle='rgba(25,25,40,0.55)';ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();}
      if(bodyGlow){ctx.fillStyle=bodyGlow;ctx.beginPath();ctx.arc(0,0,r*1.1,0,Math.PI*2);ctx.fill();}
    }

    // くちばし・目
    ctx.fillStyle=drawAsHawk?'#e8b53a':'#ff9f43';
    ctx.beginPath();ctx.moveTo(r*0.8,-2*u);ctx.lineTo(r*1.45,1*u);ctx.lineTo(r*0.8,7*u);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(r*0.4,-r*0.3,6*u,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=drawAsHawk?'#c00':'#222';ctx.beginPath();ctx.arc(r*0.5,-r*0.3,3*u,0,Math.PI*2);ctx.fill();
    if(drawAsHawk){ctx.strokeStyle='#5a2a10';ctx.lineWidth=3*u;ctx.beginPath();ctx.moveTo(r*0.1,-r*0.7);ctx.lineTo(r*0.7,-r*0.4);ctx.stroke();}

    // ★ アクセサリー（accスロット）
    if(!drawAsHawk&&equip.acc==='sunglass'){
      ctx.fillStyle='rgba(10,12,28,0.9)';ctx.beginPath();ctx.arc(r*0.42,-r*0.3,r*0.33,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#444';ctx.lineWidth=1.5*u;ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(r*0.32,-r*0.38,r*0.11,0,Math.PI*2);ctx.fill();
    }
    if(!drawAsHawk&&equip.acc==='goldmedal'){
      // リボン
      ctx.fillStyle='#cc2020';ctx.fillRect(r*0.1,-r*0.15,r*0.1,r*0.35);
      ctx.fillStyle='#2060cc';ctx.fillRect(r*0.22,-r*0.15,r*0.1,r*0.35);
      // メダル本体
      ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(r*0.22,r*0.22,r*0.3,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#b8860b';ctx.lineWidth=2*u;ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(r*0.15,r*0.15,r*0.1,0,Math.PI*2);ctx.fill();
      // 金の文字
      ctx.fillStyle='#8a6000';ctx.font=`bold ${r*0.22}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('金',r*0.22,r*0.22);
    }

    // ★ 頭のコスチューム（headスロット）
    if(!drawAsHawk&&equip.head){
      const hs=equip.head;
      const hcx=r*0.05, hby=-r*0.82;
      if(hs==='ribbon'){
        ctx.fillStyle='#ff6ba0';
        ctx.beginPath();ctx.arc(hcx-r*0.34,hby-r*0.1,r*0.24,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(hcx+r*0.34,hby-r*0.1,r*0.24,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ff2f7a';
        ctx.fillRect(hcx-r*0.34,hby-r*0.15,r*0.68,r*0.1);
        ctx.beginPath();ctx.arc(hcx,hby-r*0.1,r*0.12,0,Math.PI*2);ctx.fill();
      } else if(hs==='strawhat'){
        ctx.fillStyle='#c49a3a';ctx.beginPath();ctx.ellipse(hcx,hby-r*0.28,r*0.46,r*0.3,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#d4a84b';ctx.beginPath();ctx.ellipse(hcx,hby,r*0.72,r*0.15,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8a5a15';ctx.fillRect(hcx-r*0.46,hby-r*0.07,r*0.92,r*0.1);
      } else if(hs==='silkhat'){
        ctx.fillStyle='#111';
        ctx.beginPath();ctx.ellipse(hcx,hby,r*0.6,r*0.13,0,0,Math.PI*2);ctx.fill();
        ctx.fillRect(hcx-r*0.37,hby-r*0.72,r*0.74,r*0.72);
        ctx.beginPath();ctx.ellipse(hcx,hby-r*0.72,r*0.37,r*0.1,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(hcx-r*0.3,hby-r*0.68,r*0.16,r*0.64);
      } else if(hs==='santahat'){
        ctx.fillStyle='#cc2020';ctx.beginPath();
        ctx.moveTo(hcx-r*0.52,hby);ctx.lineTo(hcx+r*0.18,hby-r*0.82);ctx.lineTo(hcx+r*0.44,hby);ctx.closePath();ctx.fill();
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(hcx+r*0.18,hby-r*0.82,r*0.2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(hcx-r*0.04,hby,r*0.5,r*0.14,0,0,Math.PI*2);ctx.fill();
      } else if(hs==='crown'){
        ctx.fillStyle='#ffd700';ctx.beginPath();
        ctx.moveTo(hcx-r*0.52,hby);ctx.lineTo(hcx-r*0.52,hby-r*0.42);
        ctx.lineTo(hcx-r*0.2,hby-r*0.22);ctx.lineTo(hcx+r*0.05,hby-r*0.52);
        ctx.lineTo(hcx+r*0.3,hby-r*0.22);ctx.lineTo(hcx+r*0.52,hby-r*0.42);
        ctx.lineTo(hcx+r*0.52,hby);ctx.closePath();ctx.fill();
        ctx.fillStyle='#e03030';ctx.beginPath();ctx.arc(hcx+r*0.05,hby-r*0.46,r*0.09,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#30a0e0';ctx.beginPath();ctx.arc(hcx-r*0.44,hby-r*0.38,r*0.07,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#30e030';ctx.beginPath();ctx.arc(hcx+r*0.44,hby-r*0.38,r*0.07,0,Math.PI*2);ctx.fill();
      } else if(hs==='baseballcap'){
        // 野球帽：前つばのあるスポーツキャップ
        const hcx2=r*0.05, hby2=-r*0.82;
        // キャップ本体（ドーム部分）
        ctx.fillStyle='#2060c0';
        ctx.beginPath();ctx.arc(hcx2,hby2,r*0.55,Math.PI,0,false);ctx.closePath();ctx.fill();
        // 前つば
        ctx.fillStyle='#1040a0';
        ctx.beginPath();ctx.ellipse(hcx2+r*0.38,hby2+r*0.06,r*0.44,r*0.13,-0.18,0,Math.PI*2);ctx.fill();
        // 帽子のライン
        ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5*u;
        ctx.beginPath();ctx.arc(hcx2,hby2,r*0.55,Math.PI*1.2,Math.PI*1.8,false);ctx.stroke();
        // ボタン（てっぺん）
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(hcx2,hby2-r*0.54,r*0.09,0,Math.PI*2);ctx.fill();
      } else if(hs==='diamondcrown'){
        // 究極の冠：虹色に輝く大きなダイヤモンド王冠
        const hue=(time*150)%360;
        // 冠の縁取り（後光）
        ctx.fillStyle=`hsla(${hue},90%,70%,0.3)`;
        ctx.beginPath();ctx.ellipse(hcx,hby-r*0.3,r*0.85,r*0.75,0,0,Math.PI*2);ctx.fill();
        // 冠本体
        ctx.fillStyle=`hsl(${hue},80%,75%)`;
        ctx.beginPath();
        ctx.moveTo(hcx-r*0.62,hby);ctx.lineTo(hcx-r*0.62,hby-r*0.52);
        ctx.lineTo(hcx-r*0.3,hby-r*0.3);ctx.lineTo(hcx+r*0.05,hby-r*0.65);
        ctx.lineTo(hcx+r*0.4,hby-r*0.3);ctx.lineTo(hcx+r*0.62,hby-r*0.52);
        ctx.lineTo(hcx+r*0.62,hby);ctx.closePath();ctx.fill();
        // 輪郭
        ctx.strokeStyle=`hsl(${(hue+180)%360},80%,60%)`;ctx.lineWidth=1.5*u;
        ctx.beginPath();
        ctx.moveTo(hcx-r*0.62,hby);ctx.lineTo(hcx-r*0.62,hby-r*0.52);
        ctx.lineTo(hcx-r*0.3,hby-r*0.3);ctx.lineTo(hcx+r*0.05,hby-r*0.65);
        ctx.lineTo(hcx+r*0.4,hby-r*0.3);ctx.lineTo(hcx+r*0.62,hby-r*0.52);
        ctx.lineTo(hcx+r*0.62,hby);ctx.stroke();
        // 宝石（5個、虹色）
        for(let gi=0;gi<5;gi++){
          const gx=hcx-r*0.44+gi*r*0.22;
          const gy=hby-r*0.2;
          ctx.fillStyle=`hsl(${(hue+gi*72)%360},100%,65%)`;
          ctx.beginPath();ctx.arc(gx,gy,r*0.09,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='rgba(255,255,255,0.5)';
          ctx.beginPath();ctx.arc(gx-r*0.03,gy-r*0.03,r*0.04,0,Math.PI*2);ctx.fill();
        }
      }
    }
    ctx.restore();
  }

  // ---------- 障害物描画 ----------
  function drawTree(o){
    const cx=o.x+o.w/2,groundY=H-GROUND;
    ctx.fillStyle='#9a6b3f';ctx.fillRect(cx-o.w*0.16,o.topY+o.w*0.55,o.w*0.32,groundY-(o.topY+o.w*0.55));
    ctx.fillStyle='#3f9e4d';ctx.beginPath();
    ctx.arc(cx,o.topY+o.w*0.55,o.w*0.6,0,Math.PI*2);ctx.arc(cx-o.w*0.46,o.topY+o.w*0.92,o.w*0.46,0,Math.PI*2);ctx.arc(cx+o.w*0.46,o.topY+o.w*0.92,o.w*0.46,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5fc46a';ctx.beginPath();ctx.arc(cx-o.w*0.16,o.topY+o.w*0.5,o.w*0.42,0,Math.PI*2);ctx.fill();
  }
  function drawGapTree(o){
    const cx=o.x+o.w/2,fy=o.holeY-o.w*0.6;
    ctx.fillStyle='#8a5a30';ctx.fillRect(cx-o.w*0.13,-10,o.w*0.26,fy+10);
    ctx.fillStyle='#3f9e4d';ctx.beginPath();
    ctx.arc(cx,fy,o.w*0.6,0,Math.PI*2);ctx.arc(cx-o.w*0.5,fy-o.w*0.35,o.w*0.45,0,Math.PI*2);ctx.arc(cx+o.w*0.5,fy-o.w*0.35,o.w*0.45,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5fc46a';ctx.beginPath();ctx.arc(cx-o.w*0.15,fy-o.w*0.1,o.w*0.4,0,Math.PI*2);ctx.fill();
  }
  function drawHouse(o){
    const cx=o.x+o.w/2,gy=H-GROUND,bodyTop=o.topY+o.w*0.4;
    ctx.fillStyle='#ecd9ad';ctx.fillRect(o.x+o.w*0.1,bodyTop,o.w*0.8,gy-bodyTop);
    ctx.fillStyle='#c0584e';ctx.beginPath();ctx.moveTo(o.x+o.w*0.02,bodyTop);ctx.lineTo(cx,o.topY);ctx.lineTo(o.x+o.w*0.98,bodyTop);ctx.closePath();ctx.fill();
    ctx.fillStyle='#8a5a30';ctx.fillRect(cx-o.w*0.1,gy-o.w*0.42,o.w*0.2,o.w*0.42);
    ctx.fillStyle='#bfe6f5';ctx.fillRect(o.x+o.w*0.22,bodyTop+o.w*0.12,o.w*0.16,o.w*0.16);
  }
  function drawBuilding(o){
    const gy=H-GROUND,x=o.x+o.w*0.12,w=o.w*0.76;
    ctx.fillStyle='#9aa6b5';ctx.fillRect(x,o.topY,w,gy-o.topY);
    ctx.fillStyle='#7e8a99';ctx.fillRect(x,o.topY,w,o.w*0.1);
    ctx.fillStyle='#cfe6f5';
    for(let yy=o.topY+o.w*0.22;yy<gy-o.w*0.18;yy+=o.w*0.28)
      for(let i=0;i<3;i++)ctx.fillRect(x+o.w*(0.12+i*0.26),yy,o.w*0.14,o.w*0.14);
  }
  function drawPole(o){
    const cx=o.x+o.w/2,gy=H-GROUND;
    ctx.fillStyle='#9a9aa2';ctx.fillRect(cx-o.w*0.12,o.topY,o.w*0.24,gy-o.topY);
    ctx.fillStyle='#6f6f78';
    ctx.fillRect(cx-o.w*0.55,o.topY+o.w*0.2,o.w*1.1,o.w*0.12);
    ctx.fillRect(cx-o.w*0.55,o.topY+o.w*0.55,o.w*1.1,o.w*0.12);
  }
  function drawSign(o){
    const cx=o.x+o.w/2;
    ctx.fillStyle='#7a7a82';ctx.fillRect(cx-o.w*0.06,-10,o.w*0.12,o.holeY);
    ctx.fillStyle='#e0a93a';roundRect(cx-o.w*0.5,o.holeY-o.w*0.5,o.w,o.w*0.5,4*u);ctx.fill();
    ctx.fillStyle='#fff7e0';ctx.fillRect(cx-o.w*0.38,o.holeY-o.w*0.34,o.w*0.76,o.w*0.08);
    ctx.fillRect(cx-o.w*0.38,o.holeY-o.w*0.2,o.w*0.5,o.w*0.08);
  }
  function drawBuoy(o){
    const cx=o.x+o.w/2,gy=H-GROUND;
    ctx.fillStyle='#e0564f';ctx.beginPath();
    ctx.moveTo(cx-o.w*0.32,gy);ctx.lineTo(cx-o.w*0.2,o.topY);ctx.lineTo(cx+o.w*0.2,o.topY);ctx.lineTo(cx+o.w*0.32,gy);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(cx-o.w*0.27,(o.topY+gy)/2-o.w*0.06,o.w*0.54,o.w*0.13);
    ctx.fillStyle='#444';ctx.beginPath();ctx.arc(cx,o.topY,o.w*0.1,0,Math.PI*2);ctx.fill();
  }
  function drawRock(o){
    const cx=o.x+o.w/2,gy=H-GROUND;
    ctx.fillStyle='#8a8f96';ctx.beginPath();
    ctx.moveTo(o.x+o.w*0.1,gy);ctx.quadraticCurveTo(o.x+o.w*0.1,o.topY,cx,o.topY);ctx.quadraticCurveTo(o.x+o.w*0.9,o.topY,o.x+o.w*0.9,gy);ctx.closePath();ctx.fill();
    ctx.fillStyle='#a7acb2';ctx.beginPath();ctx.ellipse(cx-o.w*0.12,o.topY+o.w*0.18,o.w*0.22,o.w*0.12,0,0,Math.PI*2);ctx.fill();
  }
  function drawCloudOb(o){
    const cx=o.x+o.w/2,fy=o.holeY-o.w*0.4;
    ctx.fillStyle='#8a93a0';ctx.beginPath();
    ctx.arc(cx,fy,o.w*0.55,0,Math.PI*2);ctx.arc(cx-o.w*0.45,fy+o.w*0.05,o.w*0.4,0,Math.PI*2);ctx.arc(cx+o.w*0.45,fy+o.w*0.05,o.w*0.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#9fa8b4';ctx.beginPath();ctx.arc(cx,fy-o.w*0.12,o.w*0.4,0,Math.PI*2);ctx.fill();
  }
  function drawBoat(x,y,r){
    ctx.save();ctx.translate(x,y);
    ctx.fillStyle='#b5652f';ctx.beginPath();ctx.moveTo(-r,-r*0.05);ctx.lineTo(r,-r*0.05);ctx.lineTo(r*0.65,r*0.4);ctx.lineTo(-r*0.65,r*0.4);ctx.closePath();ctx.fill();
    ctx.fillStyle='#eef0f5';ctx.fillRect(-r*0.32,-r*0.5,r*0.64,r*0.45);
    ctx.fillStyle='#e0564f';ctx.beginPath();ctx.moveTo(r*0.1,-r*0.55);ctx.lineTo(r*0.1,-r*1.05);ctx.lineTo(r*0.6,-r*0.6);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  const OBDRAW={house:drawHouse,building:drawBuilding,pole:drawPole,sign:drawSign,tree:drawTree,hangtree:drawGapTree,buoy:drawBuoy,rock:drawRock,cloud:drawCloudOb};

  function drawCrow(x,y,r,flap){
    ctx.save();ctx.translate(x,y);
    const wing=-0.3-flap*1.0;
    ctx.fillStyle='#23232b';ctx.save();ctx.rotate(-wing);ctx.beginPath();ctx.ellipse(r*0.15,0,r*0.9,r*0.45,0,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.fillStyle='#33333d';ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e0a23a';ctx.beginPath();ctx.moveTo(-r*0.8,-2*u);ctx.lineTo(-r*1.4,1*u);ctx.lineTo(-r*0.8,6*u);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-r*0.4,-r*0.3,4*u,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c00';ctx.beginPath();ctx.arc(-r*0.45,-r*0.3,2*u,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  function drawCar(x,y,r){
    ctx.save();ctx.translate(x,y);
    ctx.fillStyle='#e8554e';roundRect(-r,-r*0.25,r*2,r*0.75,r*0.18);ctx.fill();
    ctx.fillStyle='#d6463f';ctx.beginPath();ctx.moveTo(-r*0.5,-r*0.25);ctx.lineTo(-r*0.25,-r*0.75);ctx.lineTo(r*0.45,-r*0.75);ctx.lineTo(r*0.6,-r*0.25);ctx.closePath();ctx.fill();
    ctx.fillStyle='#bfe6f5';ctx.beginPath();ctx.moveTo(-r*0.35,-r*0.3);ctx.lineTo(-r*0.2,-r*0.65);ctx.lineTo(r*0.4,-r*0.65);ctx.lineTo(r*0.5,-r*0.3);ctx.closePath();ctx.fill();
    ctx.fillStyle='#2b2b30';ctx.beginPath();ctx.arc(-r*0.5,r*0.5,r*0.28,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(r*0.5,r*0.5,r*0.28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffec99';ctx.beginPath();ctx.arc(-r*0.95,r*0.05,r*0.12,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // ---------- レンダリング ----------
  function render(){
    if(state===SHOP){renderShop();return;}

    ctx.save();
    if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);

    const night=nightLevel(),dusk=duskLevel();
    const top=mixA([126,200,232],[9,14,38],night);
    let bot=mixA([205,238,251],[28,38,78],night);
    bot=mixA(bot,[255,132,60],dusk*0.85);
    const midc=mixA(mixA(top,bot,0.5),[255,170,95],dusk*0.6);
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,rgb(top));sky.addColorStop(0.55,rgb(midc));sky.addColorStop(1,rgb(bot));
    ctx.fillStyle=sky;ctx.fillRect(-30,-30,W+60,H+60);

    if(night>0.05){
      for(const st of stars){ctx.globalAlpha=night*(0.5+0.5*Math.sin(time*2+st.tw));ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(st.x*W,st.y*H,st.r*u,0,Math.PI*2);ctx.fill();}
      ctx.globalAlpha=1;
    }
    const cyc=(time/60)%1;
    const sunX=(1-cyc)*W,sunY=H*0.22+Math.sin(cyc*Math.PI*2)*H*0.12;
    if(night<0.6){ctx.globalAlpha=1-night/0.6;ctx.fillStyle='#ffe27a';ctx.beginPath();ctx.arc(sunX,sunY,26*u,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    if(night>0.4){ctx.globalAlpha=(night-0.4)/0.6;ctx.fillStyle='#eef1f7';ctx.beginPath();ctx.arc(W-sunX,sunY,22*u,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}

    for(const c of clouds){
      const cx=c.x*W,cy=c.y*H+40*u;
      ctx.fillStyle=mix([255,255,255],[70,80,110],night);ctx.globalAlpha=0.85;
      ctx.beginPath();ctx.arc(cx,cy,24*c.s*u,0,Math.PI*2);ctx.arc(cx+24*c.s*u,cy+4*u,18*c.s*u,0,Math.PI*2);ctx.arc(cx-22*c.s*u,cy+6*u,16*c.s*u,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }

    for(const l of lines){
      ctx.globalAlpha=l.life*(l.turbo?0.8:0.6);
      ctx.strokeStyle=l.turbo?`hsl(${(time*400+l.y)%360},90%,65%)`:'rgba(255,255,255,0.55)';
      ctx.lineWidth=(l.turbo?3.5:2.5)*u;ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(l.x-l.len*(l.turbo?1.6:1),l.y);ctx.stroke();
    }
    ctx.globalAlpha=1;

    for(const fl of flyers){
      if(fl.kind==='car')drawCar(fl.x,fl.y,fl.r);
      else if(fl.kind==='boat')drawBoat(fl.x,fl.y,fl.r);
      else drawCrow(fl.x,fl.y,fl.r,(Math.sin(time*18+fl.ph)+1)/2);
    }

    ctx.textAlign='center';ctx.textBaseline='middle';
    for(const f of foods){ctx.font=32*u+'px serif';ctx.fillText(f.emoji,f.x,f.y+Math.sin((time+f.bob)*3)*3*u);}

    if(sstar){
      const pulse=1+Math.sin(time*10)*0.15;
      const blink=sstar.life<2.5?(Math.sin(time*18)>-0.3?1:0.25):1;
      ctx.globalAlpha=blink;
      const g=ctx.createRadialGradient(sstar.x,sstar.y,0,sstar.x,sstar.y,sstar.r*2.2*pulse);
      g.addColorStop(0,'rgba(255,240,150,0.9)');g.addColorStop(1,'rgba(255,220,90,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(sstar.x,sstar.y,sstar.r*2.2*pulse,0,Math.PI*2);ctx.fill();
      ctx.font=(34*u*pulse)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🌟',sstar.x,sstar.y);ctx.globalAlpha=1;
    }

    const gy=H-GROUND,dk=t=>rgb(mixA(t,[8,12,30],night*0.5)),off=(dist*20)%(24*u);
    if(curBiome===0){
      ctx.fillStyle=dk([90,92,100]);ctx.fillRect(-30,gy,W+60,GROUND+30);
      ctx.fillStyle=dk([150,152,160]);ctx.fillRect(-30,gy,W+60,12*u);
      ctx.fillStyle=dk([240,220,120]);
      for(let i=-1;i*60*u<W+60;i++)ctx.fillRect(i*60*u-off*2.5,gy+GROUND*0.5,30*u,5*u);
    } else if(curBiome===2){
      ctx.fillStyle=dk([46,124,190]);ctx.fillRect(-30,gy,W+60,GROUND+30);
      ctx.fillStyle=dk([86,158,214]);ctx.fillRect(-30,gy,W+60,12*u);
      ctx.strokeStyle=dk([180,215,240]);ctx.lineWidth=2*u;
      for(let i=-1;i*40*u<W+40;i++){const wx=i*40*u-off*1.5;ctx.beginPath();ctx.arc(wx,gy+22*u,8*u,Math.PI,0);ctx.stroke();}
    } else {
      ctx.fillStyle=dk([202,168,106]);ctx.fillRect(-30,gy,W+60,GROUND+30);
      ctx.fillStyle=dk([143,207,111]);ctx.fillRect(-30,gy,W+60,14*u);
      ctx.fillStyle=dk([123,189,93]);
      for(let i=-1;i*24*u<W+24;i++)ctx.fillRect(i*24*u-off,gy+12*u,12*u,5*u);
    }

    for(const o of obstacles){(OBDRAW[o.kind]||drawTree)(o);}

    if(state!==READY){
      const prox=1-Math.max(0,Math.min(1,gap/bird.x));
      const hx=hawk.x,hr=hawk.r*(1+hawk.lunge*0.15+prox*0.1);
      ctx.strokeStyle='rgba(120,60,30,0.3)';
      for(let i=1;i<=3;i++){ctx.globalAlpha=(0.15+prox*0.3)/i;ctx.lineWidth=2*u;ctx.beginPath();ctx.moveTo(hx-i*14*u,hawk.y);ctx.lineTo(hx-i*14*u-18*u,hawk.y);ctx.stroke();}
      ctx.globalAlpha=1;
      drawBird(hx,hawk.y,hr,(bird.y-hawk.y)/(600*u),(Math.sin(time*16)+1)/2,true);
    }

    for(const p of parts){
      ctx.globalAlpha=Math.max(0,p.life);
      if(p.txt)text(p.txt,p.x,p.y,26*u,p.color);
      else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    }
    ctx.globalAlpha=1;

    if(turbo&&state===PLAY){
      const hue=(time*360)%360;
      ctx.save();ctx.globalAlpha=0.45+0.2*Math.sin(time*22);
      ctx.fillStyle=`hsl(${hue},90%,60%)`;ctx.beginPath();ctx.arc(bird.x,bird.y,bird.r*1.8,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;ctx.strokeStyle=`hsl(${(hue+180)%360},90%,70%)`;ctx.lineWidth=3*u;
      ctx.beginPath();ctx.arc(bird.x,bird.y,bird.r*1.5,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
    if(!(state===DEAD&&deathReason==='hawk'&&deadTimer>=2.2))drawBird(bird.x,bird.y,bird.r,bird.rot,bird.flap,false);

    if(state===PLAY&&gap<bird.x*0.35){
      const danger=1-Math.max(0,gap)/(bird.x*0.35);
      const vg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.62);
      vg.addColorStop(0,'rgba(255,0,0,0)');vg.addColorStop(1,`rgba(200,0,0,${0.35*danger*(0.6+0.4*Math.sin(time*12))})`);
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    }

    // ===== UI =====
    if(state===PLAY||state===DEAD){
      const m=Math.floor(dist);
      ctx.save();ctx.translate(W/2,54*u);
      ctx.lineWidth=6*u;ctx.strokeStyle='rgba(0,0,0,0.2)';
      ctx.font=`bold ${46*u}px -apple-system,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.strokeText(m+' m',0,0);ctx.fillStyle='#fff';ctx.fillText(m+' m',0,0);
      ctx.restore();
      text(BIOME_NAMES[curBiome]||'',14*u,24*u,13*u,'rgba(255,255,255,0.9)','left','700');
      text('🍎 '+totalFood,W-14*u,24*u,13*u,'rgba(255,255,255,0.9)','right','700');

      const bw=Math.min(W-60,320*u),bh=18*u,bx=(W-bw)/2,by=90*u;
      ctx.fillStyle='rgba(0,0,0,0.25)';roundRect(bx-3,by-3,bw+6,bh+6,(bh+6)/2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.25)';roundRect(bx,by,bw,bh,bh/2);ctx.fill();
      const gw=Math.max(bh,bw*gauge);
      ctx.save();roundRect(bx,by,bw,bh,bh/2);ctx.clip();
      if(turbo){
        for(let i=0;i<bw;i+=8*u){ctx.fillStyle=`hsl(${(time*400+i*2)%360},90%,60%)`;ctx.fillRect(bx+i,by,8*u+1,bh);}
        ctx.fillStyle=`rgba(255,255,255,${0.3+0.3*Math.sin(time*20)})`;ctx.fillRect(bx,by,bw,bh);
      } else {
        const gg=ctx.createLinearGradient(bx,0,bx+bw,0);
        gg.addColorStop(0,'#56b6ff');gg.addColorStop(0.5,'#43d6a0');gg.addColorStop(1,'#ffd23f');
        ctx.fillStyle=gg;ctx.fillRect(bx,by,gw,bh);
        if(gauge>0.85){ctx.fillStyle=`rgba(255,255,255,${0.25+0.35*Math.sin(time*16)})`;ctx.fillRect(bx,by,gw,bh);}
      }
      ctx.restore();
      const lp=1+eatPop*0.5+(turbo?0.2*Math.sin(time*18):0);
      ctx.save();ctx.translate(bx+bw+16*u,by+bh/2);ctx.scale(lp,lp);text(turbo?'🔥':'⚡',0,0,18*u,'#fff');ctx.restore();
      text('SPEED（餌でUP）',bx,by-14*u,11*u,'rgba(255,255,255,0.95)','left','700');

      const by2=by+bh+24*u,bh2=14*u;
      ctx.fillStyle='rgba(0,0,0,0.25)';roundRect(bx-3,by2-3,bw+6,bh2+6,(bh2+6)/2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.22)';roundRect(bx,by2,bw,bh2,bh2/2);ctx.fill();
      const bfrac=turbo?Math.max(0,turboT/TURBO_TIME):bonus/NICE_NEED;
      const fw=bw*bfrac;
      ctx.save();roundRect(bx,by2,bw,bh2,bh2/2);ctx.clip();
      if(turbo){
        for(let i=0;i<fw;i+=8*u){ctx.fillStyle=`hsl(${(time*400+i*2)%360},90%,60%)`;ctx.fillRect(bx+i,by2,Math.min(8*u+1,fw-i),bh2);}
        ctx.fillStyle=`rgba(255,255,255,${0.3+0.3*Math.sin(time*20)})`;ctx.fillRect(bx,by2,fw,bh2);
      } else {
        ctx.fillStyle='#ffcf3f';ctx.fillRect(bx,by2,fw,bh2);
      }
      ctx.restore();
      ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1.5*u;
      for(let i=1;i<NICE_NEED;i++){const sx=bx+bw*i/NICE_NEED;ctx.beginPath();ctx.moveTo(sx,by2);ctx.lineTo(sx,by2+bh2);ctx.stroke();}
      const blp=1+eatPop*0.4+(turbo?0.15*Math.sin(time*18):0);
      ctx.save();ctx.translate(bx+bw+16*u,by2+bh2/2);ctx.scale(blp,blp);text('⭐',0,0,16*u,'#fff');ctx.restore();
      text(turbo?'🌈 TURBO！無敵！':'✨ NICE '+bonus+' / '+NICE_NEED+'（餌を全部たべる）',bx,by2-13*u,11*u,'#fff','left','700');
    }

    if(biomeBanner>0&&state===PLAY){
      const a=Math.min(1,biomeBanner/0.5)*Math.min(1,(2.6-biomeBanner)/0.3);
      ctx.globalAlpha=a;
      ctx.fillStyle='rgba(0,0,0,0.4)';roundRect(W/2-130*u,H*0.32,260*u,56*u,16*u);ctx.fill();
      text(BIOME_NAMES[curBiome]||'',W/2,H*0.32+28*u,26*u,'#fff');
      ctx.globalAlpha=1;
    }

    // タイトル画面
    if(state===READY){
      shopButtons=[];
      const cw=Math.min(360*u,W-36);
      ctx.fillStyle='rgba(0,0,0,0.12)';roundRect(W/2-cw/2,H/2-170*u,cw,150*u,22*u);ctx.fill();
      text('キョロちゃんの冒険',W/2,H/2-128*u,30*u,'#fff');
      text('🦅 タカから にげきれ！ 🐦',W/2,H/2-86*u,15*u,'rgba(255,255,255,0.95)','center','600');
      text('タップではばたく / 餌をたべて加速',W/2,H/2-60*u,13*u,'rgba(255,255,255,0.9)','center','600');
      text('🌾 餌でスピードUP（逃すとタカが食べて加速）',W/2,H/2+22*u,13*u,'#2a5a6a','center','600');
      text('✨ 一塊を全部たべて NICE！7回で TURBO',W/2,H/2+48*u,13*u,'#a0552a','center','700');
      text('🌳 低い木はこえ ぶら下がり木はくぐる',W/2,H/2+74*u,13*u,'#3a6a2a','center','600');
      text('🌟 流れ星をキャッチで 即TURBO！',W/2,H/2+98*u,13*u,'#7a5a10','center','700');
      text('ベスト  '+best+' m',W/2,H/2+128*u,22*u,'#2a5a6a');
      const a=0.5+Math.sin(time*3)*0.5;ctx.globalAlpha=a;
      text('タップして スタート',W/2,H/2+172*u,22*u,'#fff');ctx.globalAlpha=1;
      // バージョン
      text(VERSION,W-10*u,H-14*u,10*u,'rgba(255,255,255,0.4)','right','400');
      // ショップボタン
      const sbw=110*u,sbh=40*u,sbx=W-sbw-16*u,sby=H-sbh-16*u;
      ctx.fillStyle='rgba(255,200,60,0.25)';roundRect(sbx,sby,sbw,sbh,20*u);ctx.fill();
      ctx.strokeStyle='rgba(255,200,60,0.7)';ctx.lineWidth=1.5*u;roundRect(sbx,sby,sbw,sbh,20*u);ctx.stroke();
      text('🛍 ショップ',sbx+sbw/2,sby+sbh/2,13*u,'#ffe27a');
      shopButtons.push({x:sbx,y:sby,w:sbw,h:sbh,isShopBtn:true});
    }

    // ゲームオーバー
    if(state===DEAD){
      shopButtons=[];
      const cw=Math.min(310*u,W-36);
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-30,-30,W+60,H+60);
      ctx.fillStyle='#fff';roundRect(W/2-cw/2,H/2-155*u,cw,295*u,24*u);ctx.fill();
      const msg={ground:'墜落…',crash:'ぶつかった…',car:'車にぶつかった…',boat:'船にぶつかった…',crow:'カラスにぶつかった…',hawk:'つかまっちゃった…'}[deathReason]||'おしまい';
      text(msg,W/2,H/2-110*u,23*u,'#3a3a3a');
      text('にげた距離',W/2,H/2-60*u,15*u,'#999');
      text(Math.floor(dist)+' m',W/2,H/2-20*u,46*u,'#3fae5a');
      const nb=Math.floor(dist)>=best&&dist>0;
      text((nb?'★ ':'')+'ベスト '+best+' m',W/2,H/2+38*u,20*u,nb?'#ff5a5a':'#666');

      if(newUnlocks.length>0){
        ctx.fillStyle='rgba(255,215,0,0.15)';
        roundRect(W/2-cw/2+8*u,H/2+62*u,cw-16*u,38*u,10*u);ctx.fill();
        ctx.strokeStyle='rgba(255,215,0,0.6)';ctx.lineWidth=1.5*u;
        roundRect(W/2-cw/2+8*u,H/2+62*u,cw-16*u,38*u,10*u);ctx.stroke();
        const names=newUnlocks.map(c=>c.emoji+c.name).join(' ');
        text('🎉 解放！'+names,W/2,H/2+81*u,11*u,'#c8960a','center','700');
      }

      const sbw=Math.min(cw*0.7,180*u),sbh=38*u,sbx=W/2-sbw/2;
      const sby=H/2+(newUnlocks.length>0?108*u:72*u);
      ctx.fillStyle='rgba(255,200,60,0.2)';roundRect(sbx,sby,sbw,sbh,19*u);ctx.fill();
      ctx.strokeStyle='rgba(255,200,60,0.65)';ctx.lineWidth=1.5*u;roundRect(sbx,sby,sbw,sbh,19*u);ctx.stroke();
      text('🛍 ショップ  🍎'+totalFood,sbx+sbw/2,sby+sbh/2,13*u,'#c8960a');
      shopButtons.push({x:sbx,y:sby,w:sbw,h:sbh,isShopBtn:true});

      if(deadTimer>0.7){const a=0.5+Math.sin(time*4)*0.5;ctx.globalAlpha=a;text('タップして もう一回',W/2,H/2+150*u,20*u,'#fff');ctx.globalAlpha=1;}
    }

    if(flash>0){ctx.fillStyle=`rgba(255,255,255,${flash*0.6})`;ctx.fillRect(-30,-30,W+60,H+60);}
    ctx.restore();
  }

  let last=performance.now();
  function loop(now){
    let dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;
    update(dt);render();requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
